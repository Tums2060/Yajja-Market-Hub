              userName:
                type: string
              itemCount:
                type: integer
              subtotal:
                type: number
            required: [userId, userName, itemCount, subtotal]
      required: [items, subtotal, itemCount, memberSummary]

    AddCartItemBody:
      type: object
      properties:
        productId:
          type: integer
        quantity:
          type: integer
        notes:
          type: string
          nullable: true
      required: [productId, quantity]

    UpdateCartItemBody:
      type: object
      properties:
        quantity:
          type: integer
      required: [quantity]

    # ── Order ─────────────────────────────────────────────────────────────────────
    OrderItem:
      type: object
      properties:
        id:
          type: integer
        orderId:
          type: integer
        productId:
          type: integer
        productName:
          type: string
        quantity:
          type: integer
        unitPrice:
          type: number
        totalPrice:
          type: number
        notes:
          type: string
          nullable: true
      required: [id, orderId, productId, productName, quantity, unitPrice, totalPrice]

    Order:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        vendorId:
          type: integer
        vendorName:
          type: string
        riderId:
          type: integer
        status:
          $ref: "#/components/schemas/OrderStatus"
        deliveryAddress:
          type: string
        subtotal:
          type: number
        deliveryFee:
          type: number
        total:
          type: number
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        groupOrderId:
          type: integer
        notes:
          type: string
        createdAt:
          type: string
