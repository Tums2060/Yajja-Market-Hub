          type: number
        itemCount:
          type: integer
        vendorGroups:
          type: array
          items:
            type: object
            properties:
              vendorId:
                type: integer
              vendorName:
                type: string
              items:
                type: array
                items:
                  $ref: "#/components/schemas/CartItem"
              subtotal:
                type: number
            required: [vendorId, vendorName, items, subtotal]
      required: [items, subtotal, itemCount, vendorGroups]

    GroupCartItem:
      type: object
      properties:
        id:
          type: integer
        groupId:
          type: integer
        userId:
          type: integer
        userName:
          type: string
        productId:
          type: integer
        product:
          $ref: "#/components/schemas/Product"
        quantity:
          type: integer
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
      required: [id, groupId, userId, productId, quantity, createdAt]

    GroupCartResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/GroupCartItem"
        subtotal:
          type: number
        itemCount:
          type: integer
        memberSummary:
          type: array
          items:
            type: object
            properties:
