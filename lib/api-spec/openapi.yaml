          type: integer
        status:
          type: string
          enum: [pending_payment, payment_complete, placed, cancelled]
        deliveryAddress:
          type: string
        total:
          type: number
        amountCollected:
          type: number
        orders:
          type: array
          items:
            $ref: "#/components/schemas/Order"
        billAssignments:
          type: array
          items:
            $ref: "#/components/schemas/BillAssignment"
        createdAt:
          type: string
      required: [id, groupId, initiatedBy, status, total, amountCollected, createdAt]

    CreateGroupOrderBody:
      type: object
      properties:
        deliveryAddress:
          type: string
        notes:
          type: string
      required: [deliveryAddress]

    BillAssignment:
      type: object
      properties:
        id:
          type: integer
        groupOrderId:
          type: integer
        userId:
          type: integer
        userName:
          type: string
        amount:
          type: number
        paid:
          type: boolean
        createdAt:
          type: string
