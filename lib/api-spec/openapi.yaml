          type: string
        name:
          type: string
        description:
          type: string
        price:
          type: number
        imageUrl:
          type: string
        category:
          $ref: "#/components/schemas/Category"
        tags:
          type: string
        isAvailable:
          type: boolean
        createdAt:
          type: string
      required: [id, vendorId, name, price, category, isAvailable, createdAt]

    CreateProductBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
        imageUrl:
          type: string
        category:
          $ref: "#/components/schemas/Category"
        tags:
          type: string
        isAvailable:
          type: boolean
      required: [name, price, category]

    # ── Cart ─────────────────────────────────────────────────────────────────────
    CartItem:
      type: object
      properties:
        id:
          type: integer
