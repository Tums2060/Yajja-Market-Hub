          type: string
        address:
          type: string
        lat:
          type: number
        lng:
          type: number
        rating:
          type: number
        deliveryTime:
          type: string
        minOrder:
          type: number
        isOpen:
          type: boolean
        status:
          type: string
        orderCount:
          type: integer
        createdAt:
          type: string
      required: [id, userId, name, category, isOpen, createdAt]

    CreateVendorBody:
      type: object
      properties:
        name:
          type: string
        category:
          $ref: "#/components/schemas/Category"
        description:
          type: string
        imageUrl:
          type: string
        address:
          type: string
        deliveryTime:
          type: string
        minOrder:
          type: number
      required: [name, category]

    UpdateVendorBody:
      type: object
      properties:
        name:
          type: string
        ownerName:
          type: string
        category:
          $ref: "#/components/schemas/Category"
        description:
          type: string
        imageUrl:
          type: string
        address:
          type: string
        lat:
          type: number
        lng:
          type: number
        deliveryTime:
          type: string
        minOrder:
          type: number
        isOpen:
          type: boolean

    VendorStats:
      type: object
      properties:
        totalOrders:
          type: integer
        pendingOrders:
          type: integer
        todayRevenue:
          type: number
        weekRevenue:
          type: number
        totalRevenue:
          type: number
        avgRating:
          type: number
        ordersThisWeek:
          type: array
          items:
            type: object
            properties:
              day:
                type: string
              count:
                type: integer
              revenue:
                type: number
            required: [day, count, revenue]
      required: [totalOrders, pendingOrders, todayRevenue, weekRevenue, totalRevenue, avgRating, ordersThisWeek]

    # ── Product ───────────────────────────────────────────────────────────────────
    Product:
      type: object
      properties:
